<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Программирование кредитных отношений</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card-bg: #ffffff; --primary: #2563eb; --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        header { text-align: center; margin-bottom: 60px; }
        #homework-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; list-style: none; padding: 0; }
        .hw-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-decoration: none; color: inherit; transition: all 0.3s; display: flex; flex-direction: column; position: relative; }
        .hw-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .hw-card .type { font-size: 0.75rem; font-weight: 600; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        .hw-card .title { font-size: 1.25rem; font-weight: 600; }
        .loading, .error { text-align: center; padding: 20px; grid-column: 1/-1; color: var(--text-muted); }
        .cache-warning { font-size: 0.8rem; color: #b45309; background: #fffbeb; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 Мои работы</h1>
        <p>Студент: <strong>Махаматсалиев Жангазы</strong></p>
    </header>

    <div id="status-area"></div>
    <ul id="homework-list"></ul>
</div>

<script>
    const USERNAME = 'jakemonmercer-spec'; 
    const REPO = 'Works'; 

    // --- РЕЗЕРВНЫЙ СПИСОК (если API не работает) ---
    // Если лимит превышен, а ты добавил новую лабу, просто впиши её имя сюда:
    const MANUAL_FILES = ['lab1.html']; 

    async function fetchHomeworks() {
        const listElement = document.getElementById('homework-list');
        const statusArea = document.getElementById('status-area');
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) throw new Error("API Limit"); // Лимит превышен

            const files = await response.json();
            const homeworks = files
                .filter(f => f.name.toLowerCase().endsWith('.html') && f.name !== 'index.html')
                .map(f => f.name);

            // Сохраняем в кэш
            localStorage.setItem('hw_cache', JSON.stringify(homeworks));
            renderList(homeworks);

        } catch (e) {
            console.log("Использую резервные данные...");
            
            // Пытаемся взять из кэша
            const cached = localStorage.getItem('hw_cache');
            let finalFiles = MANUAL_FILES;

            if (cached) {
                finalFiles = JSON.parse(cached);
                statusArea.innerHTML = `<div class="cache-warning">⚠️ Лимит запросов GitHub превышен. Показан список из кэша (может быть не актуальным).</div>`;
            } else {
                statusArea.innerHTML = `<div class="cache-warning">⚠️ API временно недоступен. Показан ручной список работ.</div>`;
            }
            
            renderList(finalFiles);
        }
    }

    function renderList(files) {
        const listElement = document.getElementById('homework-list');
        listElement.innerHTML = '';
        
        // Убираем дубликаты и сортируем
        [...new Set(files)].sort().forEach(fileName => {
            const card = document.createElement('a');
            card.className = 'hw-card';
            card.href = fileName;
            
            const cleanName = fileName.replace('.html', '').replace(/-/g, ' ');
            
            card.innerHTML = `
                <span class="type">Отчет</span>
                <div class="title">${cleanName.charAt(0).toUpperCase() + cleanName.slice(1)}</div>
            `;
            listElement.appendChild(card);
        });
    }

    fetchHomeworks();
</script>

</body>
</html>
