<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Программирование кредитных отношений</title>
    
    <!-- Подключаем шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Сетка карточек */
        #homework-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            list-style: none;
            padding: 0;
        }

        .hw-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .hw-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .hw-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hw-card:hover::before {
            opacity: 1;
        }

        .hw-card .type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            margin-bottom: 12px;
            display: block;
        }

        .hw-card .title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .hw-card .status {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .hw-card .status::before {
            content: '→';
            margin-right: 8px;
            transition: transform 0.3s;
        }

        .hw-card:hover .status::before {
            transform: translateX(4px);
        }

        /* Состояния загрузки и ошибок */
        .loading, .error, .empty {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            border: 1px dashed var(--border);
            grid-column: 1 / -1;
        }

        .error { color: #dc2626; border-color: #fecaca; background: #fef2f2; }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📚 Лабораторные работы</h1>
        <p>Студент: <strong>Махаматсалиев Жангазы</strong></p>
        <p>Профессия: Информационные системы и технологии в экономике </p>
    </header>

    <div id="status-container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            Загрузка списка заданий с GitHub...
        </div>
    </div>
    
    <ul id="homework-list"></ul>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const USERNAME = 'jakemonmercer-spec'; 
    const REPO = 'Works'; 
    // -----------------

    async function fetchHomeworks() {
        const listElement = document.getElementById('homework-list');
        const loadingElement = document.getElementById('loading');
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                if(response.status === 403) throw new Error("Превышен лимит запросов API. Попробуйте позже.");
                if(response.status === 404) throw new Error("Репозиторий не найден. Проверьте настройки.");
                throw new Error("Не удалось загрузить данные.");
            }

            const files = await response.json();
            
            // Скрываем загрузку
            loadingElement.style.display = 'none';

            // Фильтруем файлы (только .html и не index.html)
            const homeworks = files.filter(file => {
                const name = file.name.toLowerCase();
                return name.endsWith('.html') && name !== 'index.html';
            });

            if (homeworks.length === 0) {
                listElement.innerHTML = `
                    <div class="empty">
                        <p>В репозитории пока нет файлов с заданиями.</p>
                        <p style="font-size: 0.9rem; color: #64748b;">Добавьте файлы (например, lab1.html) в корень вашего проекта.</p>
                    </div>`;
                return;
            }

            // Сортировка (лабораторные будут идти по порядку: 1, 2, 3...)
            homeworks.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

            // Создаем карточки
            homeworks.forEach(hw => {
                const card = document.createElement('a');
                card.className = 'hw-card';
                card.href = hw.name;

                // Красивое имя: убираем .html, заменяем - на пробел, делаем заглавными первую букву
                const cleanName = hw.name.replace(/\.[^/.]+$/, "").replace(/-/g, ' ');
                const formattedName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);

                card.innerHTML = `
                    <div>
                        <span class="type">Документ</span>
                        <div class="title">${formattedName}</div>
                    </div>
                    <div class="status">Открыть отчет</div>
                `;
                listElement.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            loadingElement.parentElement.innerHTML = `
                <div class="error">
                    <strong>Произошла ошибка:</strong><br>
                    ${error.message}
                </div>`;
        }
    }

    fetchHomeworks();
</script>

</body>
</html>
